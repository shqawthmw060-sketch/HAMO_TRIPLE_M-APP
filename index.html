<style>
:root {
  --bg: #0b0c10;
  --card: rgba(31,40,51,0.9);
  --primary: #00f6ff;
  --hover: #00f6ff33;
  --text: #ffffff;
  --glass: rgba(255,255,255,0.05);
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family:'Arial', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x:hidden;
}

header {
  padding:20px;
  text-align:center;
  font-size:32px;
  font-weight:bold;
  background: linear-gradient(90deg, #0f0c29, #302b63, #24243e);
  color: var(--primary);
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.section-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(150px,1fr));
  gap:20px;
  padding:20px;
}

.section-card {
  background: var(--card);
  border-radius:20px;
  padding:25px 15px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
  position: relative;
  overflow:hidden;
  transition: all 0.4s ease;
}

.section-card::after {
  content:"";
  position:absolute;
  inset:0;
  background: var(--hover);
  opacity:0;
  border-radius:20px;
  transition:0.4s;
}

.section-card:hover::after { opacity:1; }

.section-card i {
  font-size:45px;
  margin-bottom:12px;
  color: var(--primary);
  transition: 0.4s;
}

.section-card:hover i {
  color: #00ffff;
  transform: scale(1.4) rotate(10deg);
}

.section-card a {
  text-decoration:none;
  color: var(--primary);
  font-weight:bold;
  font-size:16px;
  transition:0.4s;
  display:block;
}

.section-card:hover a {
  color:#00ffff;
}

#whatsapp-btn {
  position:fixed;
  bottom:25px;
  right:20px;
  background:#25D366;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  z-index:999;
  transition:0.3s;
}

#whatsapp-btn:hover {
  transform: scale(1.2);
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

#whatsapp-btn i { color:#fff; font-size:28px; }

.dark-mode {
  --bg:#111;
  --card: rgba(50,50,50,0.85);
  --primary:#00ffff;
  --hover:#00ffff33;
}

.dark-toggle {
  position:fixed;
  top:20px;
  right:20px;
  background:var(--primary);
  color:#000;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  z-index:999;
  box-shadow:0 3px 12px rgba(0,0,0,0.4);
}

@media(max-width:480px) {
  .section-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
