<style>
/* Root Colors */
:root {
  --bg: #0a0a12;
  --neon1: #00f6ff;
  --neon2: #ff00ff;
  --card: #111;
  --text: #fff;
  --glow: #00ffff33;
}

/* Global */
* { box-sizing: border-box; margin:0; padding:0; font-family: 'Orbitron', sans-serif; }
body { background: radial-gradient(circle at top,#0a0a12 0%,#000 100%); color: var(--text); overflow-x:hidden; }

/* Animated Background Particles */
#particles { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }

/* Header */
header {
  padding: 30px;
  text-align: center;
  font-size: 36px;
  font-weight:900;
  color: var(--neon1);
  text-shadow: 0 0 10px var(--neon1), 0 0 20px var(--neon2), 0 0 30px var(--neon1);
  background: linear-gradient(90deg,#0f0c29,#302b63,#24243e);
  box-shadow:0 0 30px #00f6ff88;
  border-bottom: 2px solid var(--neon2);
  position:sticky;
  top:0;
  z-index:100;
}

/* Section Grid */
.section-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(160px,1fr));
  gap: 20px;
  padding: 30px;
  perspective: 1500px;
}

/* Cards */
.section-card {
  background: var(--card);
  border-radius: 20px;
  padding: 25px 15px;
  text-align: center;
  cursor:pointer;
  box-shadow: 0 0 15px var(--neon1), 0 0 25px var(--neon2);
  transition: transform 0.5s ease, box-shadow 0.5s ease;
  transform-style: preserve-3d;
  position: relative;
  overflow: hidden;
}

.section-card:hover {
  transform: rotateY(15deg) rotateX(5deg) scale(1.1);
  box-shadow: 0 0 25px var(--neon1), 0 0 35px var(--neon2), 0 0 45px var(--neon1);
}

/* Card Glow Effect */
.section-card::after {
  content:"";
  position:absolute;
  inset:0;
  background: linear-gradient(120deg,var(--neon1),var(--neon2));
  opacity:0.15;
  filter: blur(15px);
  transition: opacity 0.4s;
  border-radius:20px;
}

.section-card:hover::after { opacity:0.5; }

/* Icons */
.section-card i {
  font-size: 48px;
  margin-bottom:12px;
  color: var(--neon1);
  transition: 0.3s;
}
.section-card:hover i { color: var(--neon2); transform: rotate(20deg) scale(1.3); }

/* Text */
.section-card a {
  color: var(--neon1);
  font-weight: bold;
  text-decoration: none;
  display: block;
  font-size:16px;
  transition: 0.3s;
}
.section-card:hover a { color: var(--neon2); }

/* AI Button */
.ai-card {
  background: linear-gradient(135deg,#00f6ff,#ff00ff);
  color:#fff;
  padding:15px 30px;
  border-radius:50px;
  display:inline-flex;
  align-items:center;
  gap:12px;
  font-weight:bold;
  cursor:pointer;
  margin:30px auto;
  text-align:center;
  transition:0.3s;
  box-shadow:0 8px 25px rgba(0,0,0,0.8);
}
.ai-card:hover { transform:scale(1.1); box-shadow:0 12px 40px rgba(0,0,0,0.9); }
.ai-card i { font-size:28px; }

/* AI Popup */
.ai-popup {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  color:#0ff;
  border-radius:25px;
  padding:30px;
  box-shadow:0 10px 40px rgba(0,0,0,0.95);
  display:none;
  z-index:2000;
  width:350px;
  text-align:center;
}
.ai-popup h3 { margin-bottom:20px; }
.ai-popup ul { list-style:none; padding:0; margin:0 0 20px 0; }
.ai-popup li { margin:12px 0; }
.ai-popup a { color:#ff00ff; text-decoration:none; font-weight:bold; }
.ai-popup a:hover { color:#0ff; text-decoration:underline; }
.ai-popup button {
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#00f6ff;
  color:#111;
  font-weight:bold;
  cursor:pointer;
}
.ai-popup button:hover { background:#ff00ff; color:#fff; }

/* Media */
@media(max-width:480px) { .section-grid { grid-template-columns: repeat(2,1fr); } }
</style>
</head>

<script>
function toggleAI(){
  const popup = document.getElementById('aiPopup');
  popup.style.display = (popup.style.display==='block')?'none':'block';
}

// Animated Particle Background
const canvas = document.createElement('canvas');
canvas.id='particles';
document.body.appendChild(canvas);
const ctx=canvas.getContext('2d');
let w,h,particles=[];
function init(){w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; particles=[]; for(let i=0;i<80;i++){particles.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2+1,speed:Math.random()*0.5+0.2})}}
function draw(){ctx.clearRect(0,0,w,h); particles.forEach(p=>{ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle='rgba(0,255,255,0.7)'; ctx.fill(); p.x+=Math.random()*1-0.5; p.y+=p.speed; if(p.y>h){p.y=0;p.x=Math.random()*w;} }); requestAnimationFrame(draw);}
window.addEventListener('resize',init);
init(); draw();
</script>
