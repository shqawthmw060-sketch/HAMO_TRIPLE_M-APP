<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HAMO & TRIPLE M • FUTURE IPTV 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@700;900&display=swap');
    body { font-family: 'Cairo', sans-serif; }
    .matrix { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
    .neon-text { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 60px #ff00ff; }
    .holo-card { transition: all 0.4s cubic-bezier(0.23,1,0.32,1); }
    .holo-card:hover { transform: translateY(-20px) scale(1.05) rotateX(10deg); box-shadow: 0 0 80px #00ffff; }
  </style>
</head>
<body class="bg-[#05080f] text-white overflow-x-hidden">

  <!-- MATRIX RAIN BACKGROUND -->
  <canvas id="matrix" class="matrix"></canvas>

  <!-- NAVBAR -->
  <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-2xl border-b border-cyan-500/30">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-pink-500 rounded-full flex items-center justify-center text-2xl font-black">H</div>
        <h1 class="text-3xl font-black tracking-widest neon-text">HAMO & TRIPLE M</h1>
      </div>
      <div class="flex gap-8 text-lg">
        <a href="#" onclick="showSection('live')" class="hover:text-cyan-400 transition">LIVE</a>
        <a href="#" onclick="showSection('movies')" class="hover:text-cyan-400 transition">أفلام</a>
        <a href="#" onclick="showSection('series')" class="hover:text-cyan-400 transition">مسلسلات</a>
        <a href="#" onclick="showSection('anime')" class="hover:text-cyan-400 transition">أنمي</a>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="toggleAI()" class="px-6 py-3 bg-gradient-to-r from-cyan-500 to-pink-500 rounded-2xl font-bold flex items-center gap-3 hover:scale-110 transition">
          <i class="fa-solid fa-brain"></i> HAMO AI
        </button>
        <button onclick="showLogin()" class="px-8 py-3 border border-cyan-400 rounded-2xl hover:bg-cyan-400 hover:text-black transition">تسجيل الدخول</button>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="min-h-screen flex items-center justify-center relative pt-20">
    <div class="text-center z-10">
      <h1 class="text-8xl font-black neon-text mb-6 tracking-widest">FUTURE IPTV</h1>
      <p class="text-4xl text-cyan-300 mb-12">2026 • الجيل الجديد من البث</p>
      <button onclick="showLogin()" class="px-16 py-8 text-3xl font-black bg-gradient-to-r from-cyan-400 to-pink-500 rounded-3xl hover:scale-110 transition shadow-2xl">
        ابدأ المشاهدة الآن
      </button>
    </div>
  </section>

  <!-- AI CHATBOT -->
  <div id="aiModal" class="hidden fixed bottom-8 left-8 bg-black/90 border border-cyan-400 rounded-3xl w-96 h-[520px] flex flex-col shadow-2xl overflow-hidden">
    <div class="bg-gradient-to-r from-cyan-500 to-pink-500 p-5 flex items-center gap-3">
      <i class="fa-solid fa-brain text-3xl"></i>
      <div>
        <p class="font-bold">HAMO AI • الذكاء الاصطناعي</p>
        <p class="text-xs">مستشارك الشخصي</p>
      </div>
    </div>
    <div id="chatBody" class="flex-1 p-6 overflow-y-auto text-sm"></div>
    <div class="p-4 border-t border-cyan-500/30">
      <input id="aiInput" type="text" placeholder="اكتب سؤالك..." 
             class="w-full bg-black border border-cyan-400 rounded-2xl px-6 py-4 focus:outline-none" onkeypress="if(event.key==='Enter') sendAI()">
    </div>
  </div>

  <!-- CHANNEL GRID -->
  <section id="live" class="py-20">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-5xl font-black mb-12 text-center neon-text">القنوات الحية</h2>
      <div class="grid grid-cols-3 md:grid-cols-5 lg:grid-cols-6 gap-6" id="channelGrid">
        <!-- JS will fill this -->
      </div>
    </div>
  </section>

  <!-- SUBSCRIPTION BAR -->
  <div class="fixed bottom-0 left-0 right-0 bg-black/90 border-t border-pink-500 p-4 flex items-center justify-between px-8 z-50">
    <div class="flex items-center gap-6">
      <div class="text-cyan-400">اشتراكك: <span id="subStatus" class="font-bold text-pink-400">VIP ∞</span></div>
      <div class="text-xs text-gray-400">ينتهي في 12 يوم</div>
    </div>
    <button onclick="upgradeSub()" class="bg-gradient-to-r from-pink-500 to-cyan-500 px-10 py-4 rounded-2xl font-bold">ترقية الاشتراك</button>
  </div>

  <script>
    // Matrix Rain
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;
    const chars = "01アイウエオ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(5,8,15,0.05)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#00ffff';
      ctx.font = `${fontSize}px monospace`;
      for(let i=0; i<drops.length; i++) {
        const text = chars[Math.floor(Math.random()*chars.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);
        if(drops[i]*fontSize > canvas.height && Math.random()>0.975) drops[i]=0;
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 35);

    // Fake Channels
    const channels = [
      {name:"Al Jazeera", icon:"📺"}, {name:"beIN Sports 1", icon:"⚽"},
      {name:"MBC Drama", icon:"🎥"}, {name:"Netflix Live", icon:"📺"},
      {name:"Anime TV", icon:"🌸"}, {name:"Music HD", icon:"🎵"}
    ];

    function loadChannels() {
      const grid = document.getElementById('channelGrid');
      grid.innerHTML = '';
      channels.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'holo-card bg-zinc-900/70 border border-cyan-500/30 rounded-3xl p-6 text-center cursor-pointer';
        div.innerHTML = `<div class="text-6xl mb-4">\( {ch.icon}</div><p class="font-bold"> \){ch.name}</p>`;
        div.onclick = () => alert(`جاري تشغيل ${ch.name}... (Pro Max Mode)`);
        grid.appendChild(div);
      });
    }
    loadChannels();

    // AI Chatbot
    function toggleAI() {
      document.getElementById('aiModal').classList.toggle('hidden');
    }
    function sendAI() {
      const input = document.getElementById('aiInput');
      const body = document.getElementById('chatBody');
      if(!input.value) return;
      body.innerHTML += `<p class="text-right text-cyan-400">${input.value}</p>`;
      setTimeout(() => {
        body.innerHTML += `<p class="text-pink-400">HAMO AI: مرحبا! أي محتوى تحب تشوفه اليوم؟</p>`;
        body.scrollTop = body.scrollHeight;
      }, 800);
      input.value = '';
    }

    // Fake Login
    function showLogin() {
      const name = prompt("MAC Address أو Username:");
      if(name) alert(`مرحباً ${name} 👾\nاشتراكك نشط - Pro Max Mode`);
    }

    // Fake Upgrade
    function upgradeSub() {
      alert("تم ترقية اشتراكك إلى ∞ Pro Max Edition");
    }

    // Section Switch
    function showSection(sec) {
      alert(`فتح قسم ${sec} - النسخة المستقبلية 2026`);
    }

    window.onload = () => {
      console.log("%c🚀 HAMO & TRIPLE M - Pro Max Futuristic Edition Loaded", "color:#00ffff; font-size:18px; font-weight:bold");
    };
  </script>
</body>
</html>
