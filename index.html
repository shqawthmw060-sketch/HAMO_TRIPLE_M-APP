<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #0b0c10;
  --card: #1f2833;
  --primary: #00f6ff;
  --hover: #00f6ff44;
  --text: #ffffff;
  --accent: #ff0099;
}

* { box-sizing: border-box; }

body {
  margin:0;
  font-family: 'Arial', sans-serif;
  background: var(--bg);
  color: var(--text);
}

header {
  padding: 25px;
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  background: linear-gradient(90deg, #0f0c29, #302b63, #24243e);
  color: var(--primary);
  box-shadow: 0 4px 8px rgba(0,0,0,0.5);
  text-transform: uppercase;
}

#searchBar {
  width: 90%;
  max-width: 400px;
  padding: 10px 15px;
  margin: 15px auto;
  display:block;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 16px;
  background: #1f2833;
  color: #fff;
}

.section-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 20px;
  padding: 20px;
}

.section-card {
  background: var(--card);
  border-radius: 15px;
  padding: 25px 15px;
  text-align: center;
  transition: all 0.4s ease;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
}

.section-card::after {
  content:"";
  position: absolute;
  inset:0;
  background: var(--hover);
  opacity:0;
  transition:0.4s;
  border-radius: 15px;
}

.section-card:hover::after {
  opacity:1;
}

.section-card i {
  font-size: 45px;
  margin-bottom: 12px;
  color: var(--primary);
  transition: 0.3s;
}

.section-card:hover i {
  color: #00ffff;
  transform: scale(1.3);
}

.section-card a {
  text-decoration: none;
  color: var(--primary);
  font-weight: bold;
  display: block;
  font-size: 16px;
  transition: 0.3s;
}

.section-card:hover a {
  color: #00ffff;
}

.badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: bold;
  padding: 3px 7px;
  border-radius: 8px;
}

#darkModeToggle {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: var(--primary);
  color: #000;
  padding: 10px 14px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

#whatsappBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  color: #fff;
  padding: 12px 18px;
  border-radius: 50px;
  font-size: 20px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  gap:8px;
}

#whatsappBtn i { font-size: 24px; }

/* Animations */
.section-card { opacity:0; transform: translateY(20px); animation: fadeInUp 0.5s forwards; }
@keyframes fadeInUp { to { opacity:1; transform: translateY(0); } }

@media (max-width: 480px) {
  .section-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

<script>
// Search functionality
const searchBar = document.getElementById('searchBar');
const sectionsContainer = document.getElementById('sectionsContainer');
searchBar.addEventListener('input', e => {
  const term = e.target.value.toLowerCase();
  Array.from(sectionsContainer.children).forEach(card => {
    const title = card.dataset.title.toLowerCase();
    card.style.display = title.includes(term) ? 'block' : 'none';
  });
});

// Dark/Light Mode Toggle
const darkModeToggle = document.getElementById('darkModeToggle');
darkModeToggle.addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
  if(document.body.classList.contains('light-mode')){
    document.body.style.background = '#f5f5f5';
    document.body.style.color = '#000';
  } else {
    document.body.style.background = '#0b0c10';
    document.body.style.color = '#fff';
  }
});
</script>
