<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAMO & TRIPLE M AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:#00ffff;
overflow:hidden;
}

/* MATRIX EFFECT */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* كوكب */

.planet{

position:absolute;
top:10%;
right:10%;

width:200px;
height:200px;

background:radial-gradient(circle,#00ffff,#001133);

border-radius:50%;

box-shadow:0 0 80px cyan;

animation:rotatePlanet 30s linear infinite;

}

@keyframes rotatePlanet{

from{transform:rotate(0)}
to{transform:rotate(360deg)}

}

/* جسيمات */

.particle{

position:absolute;
width:4px;
height:4px;
background:#00ffff;
border-radius:50%;
animation:float 10s linear infinite;

}

@keyframes float{

from{transform:translateY(0)}
to{transform:translateY(-100vh)}

}

/* زر */

.ai-btn{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

padding:20px 40px;

background:linear-gradient(45deg,#00ffff,#ff00ff);

border-radius:50px;

font-size:22px;

cursor:pointer;

box-shadow:0 0 40px cyan;

}

/* نافذة الشات */

.panel{

position:fixed;

bottom:0;
left:0;
right:0;

height:80%;

background:#000814;

border-top-left-radius:30px;
border-top-right-radius:30px;

display:none;

flex-direction:column;

}

.header{

padding:15px;
text-align:center;

background:#001d3d;

font-size:20px;

}

.chat{

flex:1;

overflow:auto;

padding:20px;

}

.inputbox{

display:flex;

}

.inputbox input{

flex:1;

padding:15px;

background:#111;

border:none;

color:white;

}

.inputbox button{

background:#00ffff;

border:none;

padding:15px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="planet"></div>

<div class="ai-btn" onclick="openAI()">
HAMO & TRIPLE M AI
</div>

<canvas id="matrix"></canvas>

<div class="panel" id="panel">

<div class="header">
HAMO & TRIPLE M INTELLIGENCE SYSTEM
</div>

<div class="chat" id="chat"></div>

<div class="inputbox">

<input id="input" placeholder="اكتب سؤالك">

<button onclick="send()">ارسال</button>

</div>

</div>

<script>

/* MATRIX EFFECT */

let canvas=document.getElementById("matrix")

let ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

let letters="HAMOAI0123456789"

letters=letters.split("")

let fontSize=14

let columns=canvas.width/fontSize

let drops=[]

for(let x=0;x<columns;x++)
drops[x]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#0f0"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)


/* particles */

for(let i=0;i<40;i++){

let p=document.createElement("div")

p.className="particle"

p.style.left=Math.random()*100+"%"

p.style.animationDuration=(5+Math.random()*10)+"s"

document.body.appendChild(p)

}

/* فتح AI */

function openAI(){

document.getElementById("panel").style.display="flex"

speak("مرحبا بك في نظام الذكاء الاصطناعي المتطور")

}

/* صوت */

function speak(t){

let s=new SpeechSynthesisUtterance(t)

s.lang="ar"

speechSynthesis.speak(s)

}

/* كتابة حرف حرف */

function typeWriter(text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

chat.appendChild(div)

let i=0

let timer=setInterval(function(){

div.innerHTML+=text.charAt(i)

i++

if(i>=text.length) clearInterval(timer)

},30)

}

/* ارسال */

function send(){

let input=document.getElementById("input")

let chat=document.getElementById("chat")

let q=input.value

if(q==="") return

chat.innerHTML+=`<div>👤 ${q}</div>`

typeWriter("🤖 تحليل السؤال عبر شبكة HAMO AI ...")

setTimeout(()=>{

typeWriter("تم تحليل السؤال عبر شبكة ذكاء اصطناعي متقدمة.")

speak("تم تحليل السؤال")

},2000)

input.value=""

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAMO & TRIPLE M AI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

/* خلفية فضائية */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#001133,#000000);
animation:spaceMove 40s linear infinite;
}

@keyframes spaceMove{
from{transform:translate(0,0)}
to{transform:translate(-500px,-500px)}
}

/* زر AI */

.ai-button{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

background:linear-gradient(45deg,#00ffff,#ff00ff);

padding:20px 40px;

border-radius:50px;

font-size:22px;

cursor:pointer;

box-shadow:0 0 30px cyan;

transition:.4s;

}

.ai-button:hover{

transform:translate(-50%,-50%) scale(1.2);

box-shadow:0 0 60px cyan;

}

/* شاشة التحميل */

.loading{

position:fixed;

top:0;
left:0;
right:0;
bottom:0;

background:black;

display:none;

align-items:center;
justify-content:center;

flex-direction:column;

z-index:10;

}

.loader{

width:80px;
height:80px;

border:6px solid #111;

border-top:6px solid cyan;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* نافذة AI */

.ai-panel{

position:fixed;

bottom:0;
left:0;
right:0;

height:80%;

background:#020212;

border-top-left-radius:30px;
border-top-right-radius:30px;

display:none;

flex-direction:column;

box-shadow:0 0 50px #00ffff;

}

/* الهيدر */

.ai-header{

padding:15px;

text-align:center;

font-size:20px;

background:linear-gradient(90deg,#00ffff,#ff00ff);

}

/* الرسائل */

.chat{

flex:1;

overflow:auto;

padding:20px;

}

/* input */

.input-box{

display:flex;

border-top:1px solid #222;

}

.input-box input{

flex:1;

padding:15px;

background:#111;

border:none;

color:white;

}

.input-box button{

background:cyan;

border:none;

padding:15px 25px;

cursor:pointer;

}

/* hologram */

.holo{

position:absolute;

top:20px;

left:50%;

transform:translateX(-50%);

font-size:40px;

color:cyan;

text-shadow:

0 0 10px cyan,
0 0 20px cyan,
0 0 40px cyan;

animation:holo 2s infinite alternate;

}

@keyframes holo{

from{opacity:.6}
to{opacity:1}

}

</style>

</head>

<body>


<div class="holo">
HAMO & TRIPLE M
</div>


<div class="ai-button" onclick="startAI()">

<i class="fa-solid fa-robot"></i>

HAMO & TRIPLE M AI

</div>


<div class="loading" id="loading">

<div class="loader"></div>

<p>AI NETWORK ANALYSIS...</p>

</div>


<div class="ai-panel" id="panel">

<div class="ai-header">

HAMO & TRIPLE M SYSTEM

</div>

<div class="chat" id="chat"></div>

<div class="input-box">

<input id="input" placeholder="اسأل الذكاء الاصطناعي">

<button onclick="send()">ارسال</button>

</div>

</div>


<script>

function speak(text){

let speech = new SpeechSynthesisUtterance(text)

speech.lang="ar"

speech.rate=1

speech.pitch=1.1

speechSynthesis.speak(speech)

}


function startAI(){

document.getElementById("loading").style.display="flex"

setTimeout(()=>{

document.getElementById("loading").style.display="none"

document.getElementById("panel").style.display="flex"

speak("مرحبا بك في نظام حمو اند تريبل ام للذكاء الاصطناعي")

},2000)

}



function send(){

let input=document.getElementById("input")

let chat=document.getElementById("chat")

let msg=input.value

if(msg==="") return

chat.innerHTML+=`<div>👤 ${msg}</div>`

chat.innerHTML+=`<div>🤖 تحليل السؤال عبر الشبكة الذكية...</div>`

setTimeout(()=>{

let reply="تم تحليل السؤال عبر عدة أنظمة ذكاء اصطناعي."

chat.innerHTML+=`<div>🤖 ${reply}</div>`

speak(reply)

chat.scrollTop=chat.scrollHeight

},1500)

input.value=""

}

</script>

</body>
</html>
