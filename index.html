<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HAMO STREAM • Pro Max Plus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --neon-cyan: #00f6ff;
      --neon-pink: #ff00ff;
      --neon-purple: #9d00ff;
    }
    body {
      font-family: 'Cairo', sans-serif;
      color: white;
      overflow-x: hidden;
      background: #000;
    }
    #bg-video {
      position: fixed;
      right: 0; bottom: 0;
      min-width: 100%; min-height: 100%;
      z-index: -2;
      object-fit: cover;
      opacity: 0.4;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(10,0,20,0.8));
      z-index: -1;
    }
    .neon-glow { text-shadow: 0 0 15px var(--neon-cyan), 0 0 30px var(--neon-pink); }
    .glass { background: rgba(30,30,50,0.25); backdrop-filter: blur(12px); border: 1px solid rgba(0,246,255,0.18); }
    .card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .card:hover { transform: translateY(-18px) scale(1.06) rotate(1deg); box-shadow: 0 30px 60px rgba(0,246,255,0.25); }
    .section-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 2rem; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="relative">

  <video autoplay muted loop id="bg-video" playsinline>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-neon-lights-moving-in-the-dark-10735-large.mp4" type="video/mp4">
    <!-- بديل إذا ما اشتغلش: https://player.vimeo.com/external/370331493.sd.mp4?s=... (ابحث عن free cyberpunk loop) -->
  </video>
  <div class="overlay"></div>

  <!-- Header معقد -->
  <header class="fixed top-0 left-0 right-0 z-50 glass border-b border-cyan-500/30 backdrop-blur-xl">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="text-4xl font-black neon-glow tracking-tighter">HAMO</div>
        <span class="text-sm text-pink-400 font-medium tracking-widest">PRO MAX PLUS</span>
      </div>

      <div class="hidden md:flex items-center gap-8">
        <a href="#trending" class="hover:text-[var(--neon-cyan)] transition">تريندينج</a>
        <a href="#movies" class="hover:text-[var(--neon-cyan)] transition">أفلام</a>
        <a href="#series" class="hover:text-[var(--neon-cyan)] transition">مسلسلات</a>
        <a href="#anime" class="hover:text-[var(--neon-cyan)] transition">أنمي</a>
        <a href="#sports" class="hover:text-[var(--neon-cyan)] transition">رياضة</a>
        <a href="#bollywood" class="hover:text-[var(--neon-cyan)] transition">بوليوود</a>
        <a href="#turkish" class="hover:text-[var(--neon-cyan)] transition">تركي</a>
        <a href="#kids" class="hover:text-[var(--neon-cyan)] transition">أطفال</a>
      </div>

      <div class="flex items-center gap-5">
        <!-- بحث -->
        <div class="relative group">
          <input type="text" placeholder="ابحث..." class="bg-black/40 border border-cyan-500/30 focus:border-[var(--neon-cyan)] rounded-full py-2.5 px-5 pl-10 w-56 outline-none transition-all group-focus-within:w-72">
          <i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-cyan-400 text-lg"></i>
        </div>

        <!-- إعدادات -->
        <button onclick="document.getElementById('settingsModal').classList.remove('hidden')" class="p-3 rounded-full hover:bg-white/10 transition">
          <i class="fas fa-cog text-xl text-cyan-300"></i>
        </button>

        <!-- تسجيل دخول Google mock -->
        <button onclick="alert('تسجيل الدخول عبر جوجل قيد التطوير – سيتم ربطه بـ Firebase لاحقًا')" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-5 py-2.5 rounded-full transition">
          <i class="fab fa-google text-red-400"></i>
          <span class="font-medium">تسجيل الدخول</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="pt-32 pb-24 text-center relative">
    <div class="max-w-5xl mx-auto px-6">
      <h1 class="text-7xl md:text-9xl font-black neon-glow mb-6 leading-none">HAMO STREAM</h1>
      <p class="text-3xl md:text-4xl text-gray-300 mb-12 font-light">عالم كامل من الترفيه • 4K • نيون • بدون حدود</p>
      <button class="bg-gradient-to-r from-cyan-500 via-pink-500 to-purple-600 text-white font-bold text-2xl px-16 py-6 rounded-full shadow-2xl hover:scale-110 transition-transform">
        ابدأ المشاهدة الآن
      </button>
    </div>
  </section>

  <!-- أقسام متعددة (grid معقد) -->
  <section id="trending" class="py-16">
    <h2 class="section-title text-center">تريندينج الآن</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 max-w-7xl mx-auto px-6">
      <!-- كروت وهمية – يمكن تكرارها -->
      <div class="card glass rounded-2xl overflow-hidden">
        <img src="https://images.unsplash.com/photo-1536440136625-cc4289864a3c?w=500" alt="" class="w-full h-72 object-cover">
        <div class="p-4 bg-gradient-to-t from-black/80 via-black/40 to-transparent absolute bottom-0 left-0 right-0">
          <h3 class="text-xl font-bold">فيلم 1</h3>
        </div>
      </div>
      <!-- كرر 5–11 مرة حسب العدد المطلوب -->
      <!-- ... -->
    </div>
  </section>

  <section id="movies" class="py-16 bg-black/30">
    <h2 class="section-title text-center">أفلام</h2>
    <div class="grid grid-cols-2 md:grid-cols-5 gap-6 max-w-7xl mx-auto px-6">
      <!-- نفس الكروت الوهمية، يمكن إضافة المزيد -->
    </div>
  </section>

  <!-- كرر لـ series, anime, sports, bollywood, turkish, kids بنفس الطريقة -->

  <!-- Settings Modal -->
  <div id="settingsModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
    <div class="glass rounded-3xl p-10 w-full max-w-lg mx-6">
      <div class="flex justify-between mb-8">
        <h2 class="text-3xl font-bold neon-glow">الإعدادات</h2>
        <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="text-4xl text-gray-400 hover:text-white">&times;</button>
      </div>
      <div class="space-y-6">
        <div class="flex justify-between items-center">
          <span>الوضع الداكن</span>
          <label class="switch">
            <input type="checkbox" checked>
            <span class="slider round"></span>
          </label>
        </div>
        <!-- إضافات أخرى: جودة افتراضية، ترجمة، إلخ -->
      </div>
    </div>
  </div>

  <script>
    // يمكن إضافة JS لتفاعل أكثر (بحث، إلخ)
    // حاليًا الخلفية + الـ modals شغالة
  </script>
</body>
            </html>
