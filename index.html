<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAMO & TRIPLE M - Ultra Pro Max 30/30</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#0b0c10;--card:#1f2833;--primary:#00f6ff;
  --hover:#00f6ff44;--text:#ffffff;--accent:#ff00ff;
  --neon:#0ff;--shadow:0 4px 15px rgba(0,255,255,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Arial',sans-serif;}
body{background:var(--bg);color:var(--text);overflow-x:hidden;}
header{padding:25px;text-align:center;font-size:32px;font-weight:bold;
background:linear-gradient(90deg,#0f0c29,#302b63,#24243e);
color:var(--primary);box-shadow:0 5px 15px rgba(0,0,0,0.5);}
.loading-screen{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:9999;}
.loading-screen h2{color:var(--primary);font-size:24px;margin-bottom:20px;}
.loader{border:8px solid #222;border-top:8px solid var(--primary);border-radius:50%;width:80px;height:80px;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px;padding:20px;}
.section-card{background:var(--card);border-radius:20px;padding:30px 20px;text-align:center;transition:all 0.4s ease;cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.5);position:relative;overflow:hidden;}
.section-card::after{content:"";position:absolute;inset:0;background:var(--hover);opacity:0;transition:0.5s;border-radius:20px;}
.section-card:hover::after{opacity:1;}
.section-card i{font-size:50px;margin-bottom:12px;color:var(--primary);transition:0.4s;}
.section-card:hover i{color:#0ff;transform:scale(1.4);}
.section-card a{text-decoration:none;color:var(--primary);font-weight:bold;display:block;font-size:18px;transition:0.3s;}
.section-card:hover a{color:#0ff;}
#ai-card{position:fixed;bottom:30px;right:30px;background:linear-gradient(135deg,#00f6ff,#ff00ff);color:#fff;padding:20px 30px;border-radius:35px;cursor:pointer;
display:flex;align-items:center;gap:15px;box-shadow:0 8px 25px rgba(0,0,0,0.8);transition:0.3s;z-index:1000;}
#ai-card:hover{transform:scale(1.1);box-shadow:0 10px 40px rgba(0,0,0,0.9);}
#ai-card i{font-size:28px;}
#ai-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#111;color:#0ff;border-radius:25px;padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,0.95);display:none;z-index:1001;width:350px;text-align:center;}
#ai-popup h3{margin-bottom:25px;font-size:22px;color:var(--primary);}
#ai-popup ul{list-style:none;padding:0;margin:0 0 25px 0;}
#ai-popup li{margin:12px 0;}
#ai-popup a{color:var(--accent);text-decoration:none;font-weight:bold;}
#ai-popup a:hover{color:#0ff;text-decoration:underline;}
#ai-popup button{padding:12px 25px;border:none;border-radius:18px;background:var(--primary);color:#111;font-weight:bold;cursor:pointer;}
#ai-popup button:hover{background:var(--accent);color:#fff;}
.channel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;padding:20px;}
.channel-card{background:#222;border-radius:20px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,0.5);transition:0.4s;cursor:pointer;}
.channel-card img{width:100%;display:block;}
.channel-card .title{padding:12px;font-weight:bold;color:var(--primary);text-align:center;}
.channel-card:hover{transform:scale(1.08);box-shadow:0 10px 30px rgba(0,255,255,0.3);}
body::before{content:"";position:fixed;inset:0;background:url('https://images.unsplash.com/photo-1612831455545-0be7bb57f0d5?fit=crop&w=1500') center/cover no-repeat;opacity:0.08;z-index:-1;}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <h2>HAMO & TRIPLE M - Ultra Pro Max Loading...</h2>
  <div class="loader"></div>
</div>

<header>HAMO & TRIPLE M</header>

<div class="section-grid">
  <div class="section-card">
    <i class="fa-solid fa-tv"></i>
    <a href="#live">IPTV Live</a>
  </div>
  <div class="section-card">
    <i class="fa-solid fa-film"></i>
    <a href="#movies">Movies</a>
  </div>
  <div class="section-card">
    <i class="fa-solid fa-clapperboard"></i>
    <a href="#series">Series</a>
  </div>
  <div class="section-card">
    <i class="fa-solid fa-dragon"></i>
    <a href="#anime">Anime</a>
  </div>
  <div class="section-card">
    <i class="fa-solid fa-music"></i>
    <a href="#music">Music</a>
  </div>
</div>

<div id="ai-card" onclick="toggleAI()">
  <i class="fa-solid fa-robot"></i>
  <span>HAMO & TRIPLE M</span>
</div>

<div id="ai-popup">
  <h3>HAMO & TRIPLE M AI Assistant</h3>
  <ul>
    <li><a href="https://chat.openai.com/" target="_blank">AI Core</a></li>
  </ul>
  <button onclick="toggleAI()">اغلق</button>
</div>

<div class="channel-grid" id="live">
  <div class="channel-card">
    <img src="https://via.placeholder.com/300x180.png?text=Channel+1" alt="Channel 1">
    <div class="title">News Live</div>
  </div>
  <div class="channel-card">
    <img src="https://via.placeholder.com/300x180.png?text=Channel+2" alt="Channel 2">
    <div class="title">Sports Live</div>
  </div>
  <div class="channel-card">
    <img src="https://via.placeholder.com/300x180.png?text=Channel+3" alt="Channel 3">
    <div class="title">Movies Live</div>
  </div>
</div>

<script>
window.addEventListener("load",()=>{document.getElementById("loading").style.display="none";});
function toggleAI(){const popup=document.getElementById("ai-popup");popup.style.display=(popup.style.display==="block")?"none":"block";}
const aiPopup=document.getElementById("ai-popup");
function typeAI(text,element){let i=0;element.innerHTML="";const interval=setInterval(()=>{if(i<text.length){element.innerHTML+=text.charAt(i);i++;}else{clearInterval(interval);}},30);}
</script>

</body>
</html>
