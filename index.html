<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg: #0b0c10;
  --card: #1f2833;
  --primary: #00f6ff;
  --hover: #00f6ff44;
  --text: #ffffff;
  --accent: #ff00ff;
}

/* Reset */
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }

/* Body */
body {
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* Header */
header {
  padding: 25px;
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  background: linear-gradient(90deg,#0f0c29,#302b63,#24243e);
  color: var(--primary);
  box-shadow: 0 4px 10px rgba(0,0,0,0.7);
  position: relative;
  z-index: 100;
}

/* AI Button */
.ai-card {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: linear-gradient(135deg,#00f6ff,#ff00ff);
  color:#fff;
  padding:15px 25px;
  border-radius:25px;
  display:inline-flex;
  align-items:center;
  gap:12px;
  font-weight:bold;
  cursor:pointer;
  text-align:center;
  transition:0.3s;
  box-shadow:0 6px 20px rgba(0,0,0,0.7);
  z-index: 200;
}
.ai-card:hover {
  transform:scale(1.1);
  box-shadow:0 10px 30px rgba(0,0,0,0.8);
}
.ai-card i { font-size:24px; }

/* AI Popup */
.ai-popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  color:#0ff;
  border-radius:20px;
  padding:25px;
  box-shadow:0 8px 30px rgba(0,0,0,0.9);
  display:none;
  z-index:1000;
  width:90%;
  max-width:400px;
  text-align:center;
}
.ai-popup h3 { margin-bottom:20px; }
.ai-popup p { font-size:14px; margin-bottom:15px; }
.ai-popup button {
  padding:10px 20px;
  border:none;
  border-radius:15px;
  background:var(--primary);
  color:#111;
  font-weight:bold;
  cursor:pointer;
}
.ai-popup button:hover { background: var(--accent); color:#fff; }

/* Section Grid */
.section-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(150px,1fr));
  gap:20px;
  padding:20px;
  margin-top: 20px;
}
.section-card {
  background: var(--card);
  border-radius: 15px;
  padding: 25px 15px;
  text-align: center;
  transition: all 0.3s ease;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}
.section-card::after {
  content:"";
  position:absolute;
  inset:0;
  background: var(--hover);
  opacity:0;
  transition:0.4s;
  border-radius:15px;
}
.section-card:hover::after { opacity:1; }
.section-card i { font-size:40px; margin-bottom:12px; color:var(--primary); transition:0.3s; }
.section-card:hover i { color:#00ffff; transform:scale(1.3); }
.section-card a { text-decoration:none; color:var(--primary); font-weight:bold; display:block; font-size:16px; transition:0.3s; }
.section-card:hover a { color:#00ffff; }

/* Futuristic background */
#stars {
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background:#000 url('https://i.ibb.co/2n2VJwT/stars.png') repeat;
  z-index:-1;
  animation: moveStars 200s linear infinite;
}
@keyframes moveStars { 0% {background-position:0 0;} 100% {background-position:-10000px 5000px;} }

/* Matrix Effect */
.matrix { font-family: monospace; color:#0f0; position:fixed; top:0; left:0; width:100%; height:100%; overflow:hidden; pointer-events:none; z-index:-2; }
.matrix span { position:absolute; font-size:16px; animation:matrixMove linear infinite; }
@keyframes matrixMove { 0% {top:-20px;} 100% {top:100vh;} }

/* Responsive */
@media (max-width:480px) { .section-grid { grid-template-columns:repeat(2,1fr); } }
</style>
</head>

<body>

<!-- AI Popup -->
<div id="aiPopup" class="ai-popup">
  <h3>HAMO & TRIPLE M AI</h3>
  <p>الذكاء الاصطناعي يقوم بتحليل كل شيء ويقترح لك أفضل المحتوى.</p>
  <button onclick="toggleAI()">اغلق</button>
</div>

<script>
// Toggle AI Popup
function toggleAI(){
  const popup = document.getElementById('aiPopup');
  popup.style.display = (popup.style.display === 'block') ? 'none' : 'block';
}

// Matrix effect
const matrix = document.getElementById('matrix');
const cols = window.innerWidth / 20;
for(let i=0;i<cols;i++){
  const span = document.createElement('span');
  span.innerText = String.fromCharCode(33+Math.random()*94);
  span.style.left = (i*20)+'px';
  span.style.top = Math.random()*window.innerHeight + 'px';
  span.style.fontSize = '14px';
  matrix.appendChild(span);
}
setInterval(()=>{
  matrix.querySelectorAll('span').forEach(s=>{
    s.style.top = (parseFloat(s.style.top)+2) + 'px';
    if(parseFloat(s.style.top)>window.innerHeight) s.style.top='-20px';
  })
},50);
</script>
