<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HAMO TV Social</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
}

h1{
font-size:40px;
margin-bottom:40px;
letter-spacing:2px;
}

.social-grid{
display:grid;
grid-template-columns:repeat(2,200px);
gap:20px;
}

.social{
padding:25px;
border-radius:15px;
text-decoration:none;
color:white;
font-size:18px;
font-weight:bold;
transition:0.3s;
box-shadow:0 0 10px rgba(255,255,255,0.1);
}

.social:hover{
transform:scale(1.08);
box-shadow:0 0 20px rgba(255,255,255,0.4);
}

/* colors */

.whatsapp{
background:#25D366;
}

.telegram{
background:#0088cc;
}

.facebook{
background:#1877F2;
}

.instagram{
background:linear-gradient(
45deg,
#f09433,
#e6683c,
#dc2743,
#cc2366,
#bc1888
);
}

</style>

</head>

<body>

<div class="container">

<h1>Connect With HAMO</h1>

<div class="social-grid">

<a class="social whatsapp"
href="https://wa.me/201508536392"
target="_blank">
WhatsApp
</a>

<a class="social telegram"
href="https://t.me/"
target="_blank">
Telegram
</a>

<a class="social facebook"
href="https://facebook.com/"
target="_blank">
Facebook
</a>

<a class="social instagram"
href="https://instagram.com/"
target="_blank">
Instagram
</a>

</div>

</div>

</body>
</html>
